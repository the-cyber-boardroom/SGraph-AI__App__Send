<section class="hero">
  <div class="container">
    <h1 class="display">
      <span class="hero__line1">Version-controlled,</span><br>
      <span class="hero__line1">client-encrypted vaults.</span><br>
      <span class="hero__line2">For humans and agents.</span>
    </h1>

    <p class="lead">
      Every commit, every share, every agent: encrypted in your browser.
      The server is blind.
    </p>

    <div class="hero-ctas">
      <a href="https://send.sgraph.ai/en-gb/" class="btn btn-primary btn--lg" target="_blank" rel="noopener">
        Send a file →
      </a>
      <a href="https://dev.vault.sgraph.ai/en-gb/" class="btn btn-secondary btn--lg" target="_blank" rel="noopener">
        Open a Vault →
      </a>
    </div>

    <div class="hero-token-input">
      <p class="hero-token-input__label">🔑 Have a share token?</p>
      <div class="hero-token-input__row">
        <input
          id="hero-token-field"
          class="hero-token-input__field"
          type="text"
          placeholder="e.g. coral-stamp-5678"
          autocomplete="off"
          spellcheck="false"
          aria-label="Vault token"
        >
        <button class="hero-token-input__btn" type="button" id="hero-token-go">Open →</button>
      </div>
      <span class="hero-token-input__hint">No account needed · opens instantly</span>
    </div>
  </div>
</section>

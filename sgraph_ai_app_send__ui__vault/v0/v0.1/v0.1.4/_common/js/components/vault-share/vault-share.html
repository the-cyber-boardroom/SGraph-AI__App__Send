<div class="vault-share">
    <h4 class="vault-share__title" data-i18n="vault.share.title">Vault Key</h4>

    <div class="vault-share__key-display">
        <code class="vault-share__key" id="vault-key-display"></code>
    </div>

    <button class="btn btn-primary btn-sm vault-share__copy-btn" id="copy-key-btn" data-i18n="vault.share.copy">Copy Vault Key</button>

    <p class="vault-share__warning" data-i18n="vault.share.warning">Anyone with this key can access all files in this vault.</p>
</div>

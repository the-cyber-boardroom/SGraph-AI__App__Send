<div class="vault-entry">

    <div class="vault-entry__logo">
        <span class="sg-brand-logo">
            <span class="sg-brand-logo__sg">SG</span><span class="sg-brand-logo__slash">/</span><span class="sg-brand-logo__product">Vault</span>
        </span>
        <p class="vault-entry__tagline" data-i18n="app.subtitle">Your files, encrypted in your browser. The server sees nothing.</p>
    </div>

    <!-- Access key (optional for browsing, required for uploads) -->
    <div class="vault-entry__section vault-entry__access" id="access-section">
        <label class="vault-entry__label" data-i18n="vault.entry.access_label">Access Key <span class="vault-entry__optional">(optional for browsing)</span></label>
        <input class="input vault-entry__input" type="password"
               data-i18n-placeholder="vault.entry.access_placeholder"
               placeholder="Paste your access key"
               id="access-key-input"
               autocomplete="off">
        <p class="vault-entry__hint" data-i18n="vault.entry.access_hint">Only needed for uploading files. Browse and download without it.</p>
    </div>

    <!-- Open existing vault -->
    <div class="vault-entry__section" id="open-section">
        <label class="vault-entry__label" data-i18n="vault.entry.label">Enter your Vault Key</label>
        <input class="input vault-entry__input" type="password"
               data-i18n-placeholder="vault.entry.placeholder"
               placeholder="Paste your vault key here"
               id="vault-key-input"
               autocomplete="off">
        <button class="btn btn-primary vault-entry__btn" id="vault-open-btn" data-i18n="vault.entry.open">Open Vault</button>
    </div>

    <div class="vault-entry__divider"><span data-i18n="vault.entry.or">or</span></div>

    <!-- Create new vault -->
    <button class="btn btn-secondary vault-entry__btn" id="vault-create-toggle" data-i18n="vault.entry.create">Create New Vault</button>

    <div class="vault-entry__create-form" id="create-form" hidden>
        <label class="vault-entry__label" data-i18n="vault.create.name_label">Vault name</label>
        <input class="input" type="text" id="vault-name-input"
               data-i18n-placeholder="vault.create.name_placeholder"
               placeholder="My Vault"
               autocomplete="off">

        <label class="vault-entry__label" data-i18n="vault.create.passphrase_label">Vault passphrase</label>
        <input class="input" type="password" id="vault-passphrase-input"
               data-i18n-placeholder="vault.create.passphrase_placeholder"
               placeholder="Choose a strong passphrase"
               autocomplete="off">

        <button class="btn btn-primary vault-entry__btn" id="vault-create-btn" data-i18n="vault.create.create_button">Create Vault</button>
    </div>

    <!-- Status / Error -->
    <div class="vault-entry__status" id="vault-status" hidden></div>
    <div class="vault-entry__error status status--error" id="vault-error" hidden></div>

    <!-- Footer with version info -->
    <footer class="vault-entry__footer" id="vault-entry-footer">
        <span>Powered by <a href="https://sgraph.ai" target="_blank" rel="noopener">SGraph</a></span>
        <span class="vault-entry__version" id="vault-entry-version"></span>
    </footer>

</div>

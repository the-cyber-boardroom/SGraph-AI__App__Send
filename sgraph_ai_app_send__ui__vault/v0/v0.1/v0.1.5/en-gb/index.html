<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SG/Vault (v0.1.5) — Zero-knowledge encrypted vault</title>
    <meta name="description" content="Store and share files securely with zero-knowledge encryption. Your files are encrypted in your browser. The server sees nothing.">

    <!-- Fonts (vendored — no external CDN) -->
    <link rel="stylesheet" href="../../v0.1.4/_common/fonts/fonts.css">

    <!-- Design tokens (defines CSS custom properties on :root) -->
    <link rel="stylesheet" href="../../v0.1.4/_common/css/design-tokens.css">

    <!-- Shared component styles (buttons, inputs, cards — used by Shadow DOM components) -->
    <link rel="stylesheet" href="../../v0.1.4/_common/css/shared-components.css">

    <!-- Browse component styles (from SG/Send — loaded from CDN) -->
    <link rel="stylesheet" href="https://dev.send.sgraph.ai/latest/_common/js/components/send-download/send-browse.css">
    <link rel="stylesheet" href="https://dev.send.sgraph.ai/latest/_common/js/components/send-download/send-browse-v031.css">
</head>
<body>

    <vault-shell></vault-shell>

    <!-- ===================================================================
         Script Loading Order — v0.1.5 (Browse-unified vault)

         0. sg-layout (fractal window management)
         1. Vault services (EventBus, ConfigManager, MessagesService)
         2. i18n
         3. SG/Send shared modules (loaded from dev.send.sgraph.ai CDN)
         4. Browse component v0.3.2 (shared with SG/Send — loaded from CDN)
         5. VaultDataSource adapter (local — bridges SGVault → Browse interface)
         6. Vault libraries (crypto, sg-send, sg-vault)
         7. Vault base system (helpers, component paths, component base)
         8. Debug panels
         9. Vault-specific components (entry, upload, share, sgit)
        10. Vault shell v0.1.5 (slim — delegates file browsing to send-browse)
        11. Init
         =================================================================== -->

    <!-- 0. sg-layout — fractal window management (ES module from CDN) -->
    <script type="module" src="https://dev.tools.sgraph.ai/core/sg-layout/v0.1.0/sg-layout.js"></script>

    <!-- 0b. Build info (CI-generated, absent in local dev) -->
    <script src="../../v0.1.4/_common/js/build-info.js"></script>

    <!-- 1. Vault services (establish window.sgraphVault first) -->
    <script src="../../v0.1.4/_common/js/services/event-bus.js"></script>
    <script src="../../v0.1.4/_common/js/services/config-manager.js"></script>
    <script src="../../v0.1.4/_common/js/services/messages-service.js"></script>

    <!-- 2. i18n -->
    <script src="../../v0.1.4/_common/js/vault-i18n.js"></script>

    <!-- 3. SG/Send shared modules (from CDN — required by send-browse--v0.3.2.js) -->
    <script src="https://dev.send.sgraph.ai/latest/_common/js/base/send-helpers.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/base/send-component-paths.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/base/send-component.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/send-icons.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/file-type-detect.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/markdown-parser.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/markdown-parser-v031.js"></script>
    <script src="https://dev.send.sgraph.ai/latest/_common/js/sg-print.js"></script>

    <!-- 4. Browse component v0.3.2 (shared — NOT send-browse.js or send-browse-v031.js) -->
    <script src="https://dev.send.sgraph.ai/latest/_common/js/components/send-download/send-browse--v0.3.2.js"></script>

    <!-- 5. VaultDataSource adapter (local) -->
    <script src="../_common/js/adapters/vault-data-source.js"></script>

    <!-- 6. Vault libraries -->
    <script src="../../v0.1.4/_common/js/lib/sg-send/sg-send-crypto.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-send/sg-send.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-vault/sg-vault-crypto.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-vault/sg-vault-object-store.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-vault/sg-vault-ref-manager.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-vault/sg-vault-commit.js"></script>
    <script src="../../v0.1.4/_common/js/lib/sg-vault/sg-vault.js"></script>

    <!-- 7. Vault base system -->
    <script src="../../v0.1.4/_common/js/base/vault-helpers.js"></script>
    <script src="../../v0.1.4/_common/js/base/vault-component-paths.js"></script>
    <script src="../../v0.1.4/_common/js/base/vault-component.js"></script>

    <!-- 8. Debug panels -->
    <script src="../../v0.1.4/_common/js/components/messages-panel/messages-panel.js"></script>
    <script src="../../v0.1.4/_common/js/components/events-viewer/events-viewer.js"></script>
    <script src="../../v0.1.4/_common/js/components/api-logger/api-logger.js"></script>
    <script src="../../v0.1.4/_common/js/components/storage-viewer/storage-viewer.js"></script>

    <!-- 9. Vault-specific components (from v0.1.4 — entry, upload, share, sgit) -->
    <script src="../../v0.1.4/_common/js/components/vault-entry/vault-entry.js"></script>
    <script src="../../v0.1.4/_common/js/components/vault-upload/vault-upload.js"></script>
    <script src="../../v0.1.4/_common/js/components/vault-share/vault-share.js"></script>
    <script src="../../v0.1.4/_common/js/components/vault-sgit-view/vault-sgit-view.js"></script>

    <!-- 10. v0.1.5 shell components (small, focused modules) -->
    <script src="../_common/js/components/vault-header/vault-header.js"></script>
    <script src="../_common/js/components/vault-auth/vault-auth.js"></script>
    <script src="../_common/js/components/vault-nav/vault-nav.js"></script>
    <script src="../_common/js/components/vault-settings/vault-settings.js"></script>
    <script src="../_common/js/components/vault-status-bar/vault-status-bar.js"></script>
    <script src="../_common/js/components/vault-shell/vault-shell.js"></script>

    <!-- 11. Init -->
    <script>
        VaultComponentPaths.init('../../v0.1.4/_common');
        VaultI18n.init();
        window.sgraphVault.events.emit('app-init', { version: 'v0.1.5' });
    </script>

</body>
</html>

    <!-- 4c. Vault deep-link patch: use | separator (vault URL format) -->
    <script>
    (function() {
        // Global state for deep-link copy button (populated by _mountBrowse patch below)
        window._vaultDeepLinkPath  = null;
        window._vaultCurrentToken  = null;
        window._vaultBrowseElement = null;

        // Read deep-link path from hash (e.g. #token|path/to/file.md → "path/to/file.md")
        if (typeof _plrGetHashPath === 'function') {
            _plrGetHashPath = function() {
                var hash = window.location.hash.slice(1);
                var idx  = hash.indexOf('|');
                if (idx === -1) return null;
                return hash.slice(idx + 1) || null;
            };
        }
        // Do NOT write file paths back to the URL bar — the address bar stays clean.
        // Instead, update the browse component's downloadUrl so the Share tab "Copy Link"
        // button returns the correct file-specific deep link.
        if (typeof _plrSetHashPath === 'function') {
            _plrSetHashPath = function(path) {
                window._vaultDeepLinkPath = path || null;
                var browse = window._vaultBrowseElement;
                var token  = window._vaultCurrentToken;
                if (browse && token) {
                    var base = window.location.origin + '/#' + token;
                    browse.downloadUrl = path ? (base + '|' + path) : base;
                }
            };
        }
    })();
    </script>

    <!-- 12. v0.2.1 patch: create vault from simple token + vault-not-found error page -->
    <script>
    (function () {
        'use strict';

        // Extend SGVault with createFromToken — same key derivation as open(),
        // so the vault can always be re-opened with just the simple token.
        SGVault.createFromToken = async function (sgSend, token, options) {
            options = options || {};
            var keys = await SGVaultCrypto.deriveKeysFromSimpleToken(token);
            var vault = new SGVault(sgSend);
            vault._passphrase        = token;
            vault._vaultId           = keys.vaultId;
            vault._readKey           = keys.readKey;
            vault._writeKey          = keys.writeKey;
            vault._hmacKey           = keys.hmacKey;
            vault._refFileId         = keys.refFileId;
            vault._branchIndexFileId = keys.branchIndexFileId;
            vault._cloneRefFileId    = await SGVaultCrypto.deriveBranchRefFileId(
                keys.hmacKey, keys.vaultId, 'web-ui'
            );
            vault._initManagers();
            vault._settings = {
                vault_name:  options.name || token,
                vault_id:    keys.vaultId,
                created:     new Date().toISOString(),
                version:     3,
                description: options.description || ''
            };
            vault._tree = { '/': { type: 'folder', children: {} } };

            // Initial commit (empty tree + settings)
            await vault._commit('Initial vault creation');

            // Add README.md — gives sgit clone immediate content and orients new users
            var readmeDate  = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            var readmeBytes = new TextEncoder().encode(
                '# New Vault\n\n' +
                'Created at vault.sgraph.ai on ' + readmeDate + '.\n\n' +
                'Zero-knowledge encrypted — files are encrypted in your browser. The server never sees a key.\n\n' +
                '## Working with sgit\n\n' +
                '    sgit clone ' + token + '\n' +
                '    sgit push\n' +
                '    sgit pull\n'
            );
            await vault.addFile('/', 'README.md', readmeBytes);

            // Write the named ref (published branch HEAD) to the post-README commit.
            // _headCommitId is set by _commit() / addFile(); _namedHeadId is set here.
            // (Mirrors what SGVault.create() does — must NOT use _namedHeadId before this line.)
            await vault._refManager.writeRef(vault._refFileId, vault._headCommitId);
            vault._namedHeadId = vault._headCommitId;

            // Write the branch index — required for `sgit clone` to discover refs.
            // Without this, sgit has no way to find head_ref_id for the named branch
            // (the web client gets away without it because it caches ref IDs in memory,
            // but sgit starts from scratch on every clone).
            //
            // Derive deterministic branch IDs from the HMAC key (same approach as ref IDs).
            var _hmac = function (hmacKey, domain) {
                return crypto.subtle.sign('HMAC', hmacKey, new TextEncoder().encode(domain))
                    .then(function (buf) {
                        return Array.from(new Uint8Array(buf))
                            .map(function (b) { return b.toString(16).padStart(2, '0'); })
                            .join('').slice(0, 12);
                    });
            };
            var namedHex = await _hmac(vault._hmacKey, 'sg-vault-v1:file-id:branch-id:named:' + vault._vaultId);
            var cloneHex = await _hmac(vault._hmacKey, 'sg-vault-v1:file-id:branch-id:clone:web-ui:' + vault._vaultId);

            // created_at must be an integer (Unix seconds) — sgit's Type_Safe schema
            // rejects ISO 8601 strings with "Cannot convert ... to integer".
            var createdAtInt = Math.floor(new Date(vault._settings.created).getTime() / 1000);
            var branchIndex = {
                schema:   'branch_index_v1',
                branches: [
                    {
                        branch_id:   'branch-named-' + namedHex,
                        branch_type: 'named',
                        head_ref_id: vault._refFileId,
                        name:        'current',
                        created_at:  createdAtInt
                    },
                    {
                        branch_id:   'branch-clone-' + cloneHex,
                        branch_type: 'clone',
                        head_ref_id: vault._cloneRefFileId,
                        name:        'web-ui',
                        created_at:  createdAtInt
                    }
                ]
            };
            var indexPayload   = new TextEncoder().encode(JSON.stringify(branchIndex));
            var indexEncrypted = await SGSendCrypto.encrypt(indexPayload, vault._readKey);
            await vault._sgSend.vaultWrite(
                vault._vaultId,
                'bare/indexes/' + vault._branchIndexFileId,
                vault._writeKey,
                new Uint8Array(indexEncrypted)
            );
            vault._branchIndex = branchIndex;

            return vault;
        };

        // Patch VaultDataSource to expose .vault-settings as a browseable + editable file.
        // The file is synthetic: read → serialised from vault._settings; write → parsed back
        // into vault._settings and re-committed (same path the internal _commit() takes).
        // This makes the metadata visible in the file browser without duplicating it in the tree.
        (function () {
            var proto = window.VaultDataSource && window.VaultDataSource.prototype;
            if (!proto) return;

            // Settings are stored as .vault-settings.json in the encrypted commit tree
            // (v0.2.1+; v0.2.0 used .vault-settings — _loadTreeFromCommit handles both).
            var VSFILE = '.vault-settings.json';

            var _origGetTree = proto.getTree;
            proto.getTree = function () {
                var tree = _origGetTree.call(this);
                var json = JSON.stringify(this._vault._settings || {}, null, 2);
                tree.files.push({ path: VSFILE, name: VSFILE,
                                  size: new TextEncoder().encode(json).length });
                return tree;
            };

            var _origGetFileList = proto.getFileList;
            proto.getFileList = function () {
                var list = _origGetFileList.call(this);
                var json = JSON.stringify(this._vault._settings || {}, null, 2);
                list.push({ path: VSFILE, name: VSFILE,
                            dir: false, size: new TextEncoder().encode(json).length });
                return list;
            };

            var _origGetFileBytes = proto.getFileBytes;
            proto.getFileBytes = async function (path) {
                if (path === VSFILE) {
                    var json = JSON.stringify(this._vault._settings || {}, null, 2);
                    return new TextEncoder().encode(json).buffer;
                }
                return _origGetFileBytes.call(this, path);
            };

            var _origSaveFile = proto.saveFile;
            proto.saveFile = async function (folderPath, fileName, bytes) {
                if (fileName === VSFILE) {
                    if (!this.writable) throw new Error('Read-only: no access key');
                    var buf  = bytes instanceof ArrayBuffer ? bytes : new Uint8Array(bytes).buffer;
                    var text = new TextDecoder().decode(buf);
                    this._vault._settings = JSON.parse(text);
                    await this._vault._commit('Update .vault-settings');
                    if (this.onTreeChanged) this.onTreeChanged();
                    return;
                }
                return _origSaveFile.call(this, folderPath, fileName, bytes);
            };
        }());

        // Hide .vs-entry immediately when a vault token is present in the URL hash.
        // This script runs after vault-shell has rendered (connectedCallback is sync) but
        // before vault-entry's async template fetch completes, so the form is never visible.
        // vault-entry.onReady() still handles the open/create logic in the background.
        (function () {
            var hash = window.location.hash;
            if (!hash || hash === '#') return;
            var shell    = document.querySelector('vault-shell');
            var entryDiv = shell && shell.querySelector('.vs-entry');
            if (entryDiv) entryDiv.style.display = 'none';
        }());

        // Show a "Creating your vault…" splash immediately when the landing page redirected
        // here with sg-vault-creating set. The splash fills the blank screen while the async
        // crypto key derivation and initial commit network call complete.
        (function () {
            var hash     = window.location.hash;
            if (!hash || hash === '#') return;
            var token    = decodeURIComponent(hash.slice(1)).split('|')[0].toLowerCase();
            var creating = sessionStorage.getItem('sg-vault-creating');
            if (!creating || creating !== token) return;

            var splash = document.createElement('div');
            splash.id  = 'sg-creating-splash';
            splash.setAttribute('style',
                'position:fixed;inset:0;z-index:9999;background:#0d1117;' +
                'display:flex;align-items:center;justify-content:center;' +
                'flex-direction:column;gap:1.25rem;font-family:system-ui,sans-serif;' +
                'text-align:center;padding:2rem');
            splash.innerHTML =
                '<div style="font-size:3rem">🔐</div>' +
                '<div style="color:#4ecdc4;font-size:1.2rem;font-weight:700">Creating your vault…</div>' +
                '<div style="color:#6e7a8a;font-size:0.85rem;max-width:360px;line-height:1.6">' +
                'Deriving encryption keys and writing the initial commit.<br>This takes a moment.' +
                '</div>';
            document.body.appendChild(splash);
        }());

        // Helper: remove the creating splash (safe to call even if it was never shown).
        function _removeSplash() {
            var el = document.getElementById('sg-creating-splash');
            if (el) el.remove();
        }

        // Helper: reveal the vault-entry form (used when create fails so the error is visible).
        function _revealEntry() {
            var shell    = document.querySelector('vault-shell');
            var entryDiv = shell && shell.querySelector('.vs-entry');
            if (entryDiv) entryDiv.style.display = '';
        }

        // Full-page error when auto-open fails — replaces the page body entirely
        function _escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function _showAutoOpenErrorPage(token, err) {
            var msg = err ? err.message : '';
            var isNotFound = msg.includes('not found') || msg.includes('404');
            var title    = isNotFound ? 'Vault not found' : 'Cannot open vault';
            var subtitle = isNotFound
                ? 'This vault does not exist on this server:'
                : 'The token may be invalid or in the wrong format:';

            document.body.innerHTML =
                '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
                'flex-direction:column;gap:1.25rem;padding:2rem;background:#0d1117;' +
                'font-family:system-ui,sans-serif;text-align:center">' +
                '<div style="font-size:3rem">🔐</div>' +
                '<h1 style="color:#fff;font-size:1.5rem;font-weight:700;margin:0">' + _escHtml(title) + '</h1>' +
                '<p style="color:#6e7a8a;font-size:0.875rem;max-width:420px;line-height:1.6;margin:0">' + _escHtml(subtitle) + '</p>' +
                '<div style="display:flex;flex-direction:column;gap:0.3rem;align-items:center">' +
                '<div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:#6e7a8a">Vault token</div>' +
                '<code style="display:block;color:#4ecdc4;font-family:monospace;font-size:1.05rem;' +
                'letter-spacing:0.02em;background:rgba(78,205,196,0.06);' +
                'border:1px solid rgba(78,205,196,0.15);border-radius:6px;padding:0.5rem 1.25rem">' +
                _escHtml(token) + '</code>' +
                '</div>' +
                '<a href="/en-gb/" style="display:inline-block;background:#4ecdc4;color:#0a1a18;' +
                'font-weight:700;text-decoration:none;border-radius:8px;padding:0.65rem 1.5rem;' +
                'font-size:0.9rem;margin-top:0.25rem">← Back to vault home</a>' +
                '</div>';
        }

        // Reload when the user manually changes the URL hash (e.g. typing a new vault token
        // in the address bar and pressing Enter). history.replaceState/pushState does NOT
        // fire hashchange, so internal navigation within a vault is unaffected.
        window.addEventListener('hashchange', function () {
            window.location.reload();
        });

        // Patch VaultShell._mountBrowse:
        //   1. Fix downloadUrl — use vault key, not window.location.href (which may be '/'
        //      after create-then-clear-hash).
        //   2. Store the browse element reference so _plrSetHashPath can update it when
        //      a file tab is opened (deep-link copy button mechanism).
        // VaultShell and VaultSettings are defined inside IIFEs in their source files,
        // so they are NOT global variables. Use customElements.get() to access their class.
        (function () {
            var VaultShellClass = customElements.get('vault-shell');
            if (!VaultShellClass) return;
            var _origMount = VaultShellClass.prototype._mountBrowse;
            VaultShellClass.prototype._mountBrowse = async function (deepLink) {
                await _origMount.call(this, deepLink);
                var browse = this.querySelector('.vs-view-files send-browse');
                var token  = this._vaultKey;
                if (browse && token) {
                    browse.downloadUrl = window.location.origin + '/#' + token;
                }
                window._vaultCurrentToken  = token  || null;
                window._vaultBrowseElement = browse || null;
                // Reset deep-link path on each mount (new browse, fresh state)
                window._vaultDeepLinkPath  = null;
            };
        }());

        // Patch VaultSettings.refresh: inject a VAULT URL row below the Vault Key section.
        // The URL is constructed from window.location.origin + '/#' + vaultKey so it always
        // reflects the current host (localhost, dev.vault.sgraph.ai, vault.sgraph.ai, etc.)
        (function () {
            var VaultSettingsClass = customElements.get('vault-settings');
            if (!VaultSettingsClass) return;
            var _origRefresh = VaultSettingsClass.prototype.refresh;
            VaultSettingsClass.prototype.refresh = function () {
                _origRefresh.call(this);
                if (!this._vault || !this._vaultKey) return;
                var root     = this.shadowRoot;
                if (!root) return;
                var vaultUrl = window.location.origin + '/#' + this._vaultKey;

                // Update if already injected
                var existing = root.querySelector('.vset-url-input');
                if (existing) { existing.value = vaultUrl; return; }

                // Find the vault key section to insert after it
                var keySection = null;
                root.querySelectorAll('.vset-section').forEach(function (s) {
                    if (s.querySelector('.vset-key-input')) keySection = s;
                });
                if (!keySection) return;

                var urlSection = document.createElement('div');
                urlSection.className = 'vset-section';
                urlSection.innerHTML =
                    '<label class="vset-label">Vault URL</label>' +
                    '<div class="vset-row">' +
                    '<input class="vset-input vset-url-input" type="text" readonly>' +
                    '<button class="vset-btn vset-copy-url">Copy</button>' +
                    '</div>' +
                    '<p class="vset-hint">Direct browser link to this vault. Treat it like the vault key — anyone with it can read all files.</p>';
                keySection.after(urlSection);
                root.querySelector('.vset-url-input').value = vaultUrl;

                root.querySelector('.vset-copy-url').addEventListener('click', function () {
                    var btn = this;
                    var url = root.querySelector('.vset-url-input').value;
                    navigator.clipboard.writeText(url).then(function () {
                        btn.textContent = 'Copied ✓';
                        btn.style.color = '#4ecdc4';
                        setTimeout(function () { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
                    });
                });
            };
        }());

        // Patch VaultSettings._copyKey: flash "Copied ✓" on the Vault Key copy button.
        (function () {
            var VaultSettingsClass = customElements.get('vault-settings');
            if (!VaultSettingsClass) return;
            VaultSettingsClass.prototype._copyKey = function () {
                var input = this.shadowRoot.querySelector('.vset-key-input');
                var btn   = this.shadowRoot.querySelector('.vset-copy-key');
                if (!input || !btn) return;
                navigator.clipboard.writeText(input.value).then(function () {
                    btn.textContent = 'Copied ✓';
                    btn.style.color = '#4ecdc4';
                    setTimeout(function () { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
                });
            };
        }());

        // Rename "⇌ Vaults" → "Open or Create Vault" and style as a teal navigation button.
        // Placed first in .vh-right (order:-1) so it reads as navigation rather than an action.
        (function () {
            var header  = document.querySelector('vault-shell vault-header');
            var lockBtn = header && header.shadowRoot && header.shadowRoot.querySelector('.vh-lock-btn');
            if (lockBtn) {
                lockBtn.textContent = 'Open or Create Vault';
                lockBtn.title       = 'Lock this vault and return to the entry screen';
                lockBtn.style.cssText = [
                    'order:-1',
                    'color:#4ecdc4',
                    'border-color:rgba(78,205,196,0.4)',
                    'margin-right:0.75rem',
                    'font-weight:600'
                ].join(';');
            }
        }());

        // Patch VaultEntry._onSimpleTokenOpen:
        //   - When sg-vault-creating is set (new vault from landing page), create instead of open
        //   - When auto-opening from the URL hash and any error occurs, show full-page error
        //   - When the user manually typed a token and clicked, show the usual inline error
        var _orig = VaultEntry.prototype._onSimpleTokenOpen;
        VaultEntry.prototype._onSimpleTokenOpen = async function () {
            var token       = this._simpleTokenInput.value.trim().toLowerCase();
            var createToken = sessionStorage.getItem('sg-vault-creating');

            // Create-vault flow (redirected from landing page)
            if (createToken && createToken === token) {
                sessionStorage.removeItem('sg-vault-creating');
                var accessKey = this._accessKeyInput.value.trim();
                if (!accessKey) {
                    _removeSplash();
                    _revealEntry();
                    this._showError('An access key is required to create a new vault.');
                    this._accessKeyInput.focus();
                    return;
                }
                this._hideError();
                try {
                    var sgSend = this._getSGSend();
                    // Name uses a friendly date/time — NOT the token. Token stays in localStorage/settings.
                    var now     = new Date();
                    var dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    var timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    var vaultName = 'New Vault (' + dateStr + ' · ' + timeStr + ')';
                    var vault = await SGVault.createFromToken(sgSend, token, { name: vaultName });

                    // Clear hash — vault key is NOT exposed in the address bar.
                    // Key is persisted in localStorage and accessible via vault Settings.
                    window.history.replaceState(null, '', '/en-gb/vault');
                    try { localStorage.setItem('sg-vault-key', token); } catch (_) {}

                    // Patch landing page history entry to use the proper name
                    try {
                        var pickerKey  = 'sg-vault-picker:credentials';
                        var pickerList = JSON.parse(localStorage.getItem(pickerKey) || '[]');
                        for (var i = 0; i < pickerList.length; i++) {
                            if (pickerList[i].vaultKey === token) {
                                pickerList[i].vaultName = vaultName;
                                break;
                            }
                        }
                        localStorage.setItem(pickerKey, JSON.stringify(pickerList));
                    } catch (_) {}

                    _removeSplash();
                    this._saveToHistory(vault, token);
                    this.emit('vault-created', { vault, vaultKey: token });
                } catch (err) {
                    sessionStorage.setItem('sg-vault-creating', token); // restore for retry
                    _removeSplash();
                    _revealEntry();
                    this._showError('Failed to create vault: ' + err.message);
                }
                return;
            }

            // Detect whether this is an auto-open triggered by the URL hash (vault-entry onReady)
            // vs a manual open triggered by the user clicking "Open Vault".
            var hashToken = decodeURIComponent(window.location.hash.slice(1)).split('|')[0].toLowerCase();
            var isAutoOpen = !!hashToken && hashToken === token;

            if (!isAutoOpen) {
                // Manual open — delegate to original for standard inline error handling
                return _orig.call(this);
            }

            // Auto-open from URL hash: any failure shows the full-page error
            this._hideError();
            this._showStatus('Opening vault…');
            this._simpleTokenBtn.disabled = true;
            try {
                await this._openVault(token, token);
                // Remove token from URL once vault is open (security hygiene)
                window.history.replaceState(null, '', '/en-gb/vault');
            } catch (err) {
                _showAutoOpenErrorPage(token, err);
            } finally {
                this._simpleTokenBtn.disabled = false;
                this._hideStatus();
            }
        };
    })();
    </script>

</body>

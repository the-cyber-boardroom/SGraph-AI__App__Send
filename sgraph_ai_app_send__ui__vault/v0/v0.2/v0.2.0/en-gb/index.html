    <!-- 4c. Vault deep-link patch: override page layout hash functions to use | separator -->
    <script>
    (function() {
        // The page layout overlay uses _plrGetHashPath/_plrSetHashPath with / separator.
        // Vault uses | separator: #token|path/to/file
        if (typeof _plrGetHashPath === 'function') {
            _plrGetHashPath = function() {
                var hash = window.location.hash.slice(1);
                var idx  = hash.indexOf('|');
                if (idx === -1) return null;
                var path = hash.slice(idx + 1);
                return path || null;
            };
        }
        if (typeof _plrSetHashPath === 'function') {
            _plrSetHashPath = function(path) {
                var hash  = window.location.hash.slice(1);
                var idx   = hash.indexOf('|');
                var token = idx === -1 ? hash : hash.slice(0, idx);
                var next  = token + (path ? '|' + path : '');
                if (hash !== next) history.replaceState(null, '', '#' + next);
            };
        }
    })();
    </script>

<body>

  <div class="brand">
    <span class="brand-prefix">SG</span><span class="brand-slash">/</span><span class="brand-product">Send</span>

  <p class="tagline">Redirecting&hellip;</p>

  <noscript>

  </noscript>

  <script>
    // ── Locale detection and redirect ────────────────────────────────
    //
    // Detects the user's preferred language from the browser and
    // redirects to the matching locale folder. No external files are
    // loaded — this runs instantly on the branded dark background.
    //
    // Priority:
    //   1. Exact match:   navigator.language "pt-BR" → /pt-br/
    //   2. Language match: navigator.language "de"    → /de-de/
    //   3. Default:        → /en-gb/

    (function () {
      var LOCALES = [
        'en-gb', 'en-us', 'pt-pt', 'pt-br',
        'de-de', 'de-ch', 'es-es', 'es-ar', 'es-mx',
        'fr-fr', 'fr-ca', 'it-it', 'nl-nl', 'pl-pl',
        'hr-hr', 'ro-ro', 'tlh'
      ];

      // Language-only fallback → primary locale for that language
      var LANG_FALLBACKS = {
        'en': 'en-gb',
        'pt': 'pt-pt',
        'de': 'de-de',
        'es': 'es-es',
        'fr': 'fr-fr',
        'it': 'it-it',
        'nl': 'nl-nl',
        'pl': 'pl-pl',
        'hr': 'hr-hr',
        'ro': 'ro-ro'
      };

      var DEFAULT = 'en-gb';

      function detect() {
        var langs = navigator.languages || [navigator.language || navigator.userLanguage || ''];
        for (var i = 0; i < langs.length; i++) {
          var tag = langs[i].toLowerCase();

          // 1. Exact match (e.g. "pt-br" → "pt-br")
          if (LOCALES.indexOf(tag) !== -1) return tag;

          // 2. Language-only fallback (e.g. "de" → "de-de")
          var lang = tag.split('-')[0];
          if (LANG_FALLBACKS[lang]) return LANG_FALLBACKS[lang];
        }
        return DEFAULT;
      }

      var locale = detect();
      var base   = document.location.pathname.replace(/\/+$/, '');

      // Redirect: ./en-gb/  (relative to current path)
      document.location.replace(base + '/' + locale + '/');
    })();
  </script>

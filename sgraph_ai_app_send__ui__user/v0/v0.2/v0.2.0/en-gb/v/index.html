<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SG/Send — Receive</title>
    <meta name="description" content="View an encrypted file. Zero-knowledge encryption — decryption happens in your browser.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../../_common/favicon.svg">

    <!-- Fonts (vendored — no external CDN) -->
    <link rel="stylesheet" href="../../_common/fonts/fonts.css">

    <!-- Design tokens -->
    <link rel="stylesheet" href="../../_common/css/design-tokens.css">

    <!-- Component styles — v0.2.0 base -->
    <link rel="stylesheet" href="../../_common/css/shared-components.css">
    <link rel="stylesheet" href="../../_common/js/components/send-download/send-download.css">
    <link rel="stylesheet" href="../../_common/js/components/send-transparency/send-transparency.css">
    <link rel="stylesheet" href="../../_common/js/components/send-header/send-header.css">
    <link rel="stylesheet" href="../../_common/js/components/send-footer/send-footer.css">
    <link rel="stylesheet" href="../../_common/js/components/send-locale/send-locale.css">

    <!-- Component styles — v0.2.1 overrides -->
    <link rel="stylesheet" href="../../_common/js/components/send-download/send-download-v021.css">

    <!-- Component styles — v0.2.2 overrides -->
    <link rel="stylesheet" href="../../_common/js/components/send-download/send-download-v022.css">
</head>
<body>

    <send-header></send-header>

    <main>
        <send-download></send-download>

        <div id="download-actions" style="display: none; margin-top: 1rem; text-align: center;">
            <a href="/" id="send-new-btn" class="btn btn-sm btn-secondary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
                Send a file or folder
            </a>
        </div>

        <p class="disclaimer" style="display: none;" id="download-disclaimer" data-i18n="app.disclaimer">This is a beta service. Do not upload confidential or illegal content.</p>
    </main>

    <send-footer></send-footer>

    <!-- ═══════════════════════════════════════════════════════════════════
         Script Loading Order — Viewer page (v0.2.0 + v0.2.1 + v0.2.2 + v0.2.3)
         ═══════════════════════════════════════════════════════════════════ -->

    <!-- 0. Vendored libraries -->
    <script src="../../_common/js/vendor/jszip.min.js"></script>

    <!-- 0. Build info -->
    <script src="../../_common/js/build-info.js"></script>
    <script>
        if (!window.SGRAPH_BUILD) {
            window.SGRAPH_BUILD = { appVersion: 'dev', uiVersion: 'v0.2.3' };
        } else {
            window.SGRAPH_BUILD.uiVersion = 'v0.2.3';
        }
    </script>

    <!-- 1. Utilities -->
    <script src="../../_common/js/i18n.js"></script>
    <script src="../../_common/js/crypto.js"></script>
    <script src="../../_common/js/friendly-crypto.js"></script>
    <script src="../../_common/js/api-client.js"></script>
    <script src="../../_common/js/file-type-detect.js"></script>
    <script src="../../_common/js/markdown-parser.js"></script>

    <!-- 2. Base system -->
    <script src="../../_common/js/base/send-helpers.js"></script>
    <script src="../../_common/js/base/send-component-paths.js"></script>
    <script src="../../_common/js/base/send-component.js"></script>

    <!-- 3. Components — v0.2.0 base -->
    <script src="../../_common/js/components/send-locale/send-locale.js"></script>
    <script src="../../_common/js/components/send-header/send-header.js"></script>
    <script src="../../_common/js/components/send-footer/send-footer.js"></script>
    <script src="../../_common/js/components/send-transparency/send-transparency.js"></script>
    <script src="../../_common/js/components/send-download/send-download.js"></script>

    <!-- 3a. Surgical overrides: v0.2.1 → v0.2.2 → v0.2.3 (friendly token) -->
    <script src="../../_common/js/components/send-download/send-download-v021.js"></script>
    <script src="../../_common/js/components/send-download/send-download-v022.js"></script>
    <script src="../../_common/js/components/send-download/send-download-v023.js"></script>

    <!-- 4. Init -->
    <script>
        SendComponentPaths.init('../../_common');
        I18n.init();
    </script>

</body>
</html>

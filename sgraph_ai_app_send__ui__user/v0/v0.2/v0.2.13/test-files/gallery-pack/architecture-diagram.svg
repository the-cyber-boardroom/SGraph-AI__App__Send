<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#2a3a52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4DD0E1"/>
      <stop offset="100%" style="stop-color:#4ECDC4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">SG/Send Architecture</text>
  <text x="400" y="68" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="13">Zero-Knowledge Encrypted File Sharing</text>

  <!-- Browser box -->
  <rect x="40" y="100" width="220" height="180" rx="8" fill="rgba(77,208,225,0.08)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="150" y="125" text-anchor="middle" fill="#4DD0E1" font-family="system-ui" font-size="14" font-weight="600">Browser (Client)</text>
  <text x="150" y="155" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">AES-256-GCM Encrypt</text>
  <text x="150" y="175" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Web Crypto API</text>
  <text x="150" y="195" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Thumbnail Generation</text>
  <text x="150" y="215" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Gallery Preview</text>
  <rect x="70" y="235" width="160" height="30" rx="4" fill="url(#accent)"/>
  <text x="150" y="255" text-anchor="middle" fill="#1a2332" font-family="system-ui" font-size="12" font-weight="600">Key stays here</text>

  <!-- Arrow -->
  <line x1="270" y1="190" x2="360" y2="190" stroke="#4DD0E1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="315" y="180" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="10">TLS 1.3</text>
  <text x="315" y="210" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="10">Ciphertext only</text>

  <!-- Lambda box -->
  <rect x="370" y="100" width="180" height="180" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="460" y="125" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="14" font-weight="600">Lambda (Server)</text>
  <text x="460" y="155" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">Store ciphertext</text>
  <text x="460" y="175" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">Token management</text>
  <text x="460" y="195" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">Rate limiting</text>
  <rect x="390" y="215" width="140" height="30" rx="4" fill="rgba(255,100,100,0.15)" stroke="rgba(255,100,100,0.3)" stroke-width="1"/>
  <text x="460" y="235" text-anchor="middle" fill="#ff6464" font-family="system-ui" font-size="11" font-weight="600">No plaintext ever</text>

  <!-- Arrow to storage -->
  <line x1="560" y1="190" x2="600" y2="190" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Storage box -->
  <rect x="610" y="130" width="150" height="120" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="685" y="158" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="14" font-weight="600">Storage</text>
  <text x="685" y="185" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">Memory-FS / S3</text>
  <text x="685" y="205" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">Encrypted blobs</text>
  <text x="685" y="225" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">ip_hash (SHA-256)</text>

  <!-- Recipient flow -->
  <rect x="40" y="330" width="220" height="130" rx="8" fill="rgba(78,205,196,0.08)" stroke="#4ECDC4" stroke-width="1.5"/>
  <text x="150" y="358" text-anchor="middle" fill="#4ECDC4" font-family="system-ui" font-size="14" font-weight="600">Recipient Browser</text>
  <text x="150" y="385" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Decrypt with shared key</text>
  <text x="150" y="405" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Gallery / Download view</text>
  <text x="150" y="425" text-anchor="middle" fill="#E0E0E0" font-family="system-ui" font-size="11">Thumbnail preview</text>

  <!-- Arrow from lambda to recipient -->
  <line x1="370" y1="290" x2="260" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="340" y="320" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="10">Ciphertext</text>

  <!-- Key sharing (out of band) -->
  <path d="M 150 280 C 150 310, 150 310, 150 330" stroke="#4DD0E1" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="75" y="310" fill="#4DD0E1" font-family="system-ui" font-size="10">Key shared out-of-band</text>

  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" fill="#8892A0" font-family="system-ui" font-size="11">SG/Send v0.2.13 — Zero-knowledge by design, not by policy</text>
</svg>

<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SG/Send — Zero-knowledge encrypted file sharing</title>
    <meta name="description" content="Share files securely with zero-knowledge encryption. Your files are encrypted in your browser before upload. The server never sees your data.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../_common/favicon.svg">

    <!-- Fonts (vendored — no external CDN) -->
    <link rel="stylesheet" href="../_common/fonts/fonts.css">

    <!-- Design tokens (defines CSS custom properties on :root) -->
    <link rel="stylesheet" href="../_common/css/design-tokens.css">

    <!-- Component styles — v0.2.0 base -->
    <link rel="stylesheet" href="../_common/css/shared-components.css">
    <link rel="stylesheet" href="../_common/js/components/send-upload/send-upload.css">
    <link rel="stylesheet" href="../_common/js/components/send-transparency/send-transparency.css">
    <link rel="stylesheet" href="../_common/js/components/send-header/send-header.css">
    <link rel="stylesheet" href="../_common/js/components/send-footer/send-footer.css">
    <link rel="stylesheet" href="../_common/js/components/send-locale/send-locale.css">
    <link rel="stylesheet" href="../_common/js/components/send-test-files/send-test-files.css">
</head>
<body>

    <send-header></send-header>

    <main>
        <send-access-gate>
            <send-upload></send-upload>
        </send-access-gate>

        <send-test-files></send-test-files>

        <p class="disclaimer" data-i18n="app.disclaimer">This is a beta service. Do not upload confidential or illegal content.</p>
    </main>

    <send-footer></send-footer>

    <!-- ═══════════════════════════════════════════════════════════════════
         Script Loading Order — v0.2.13 (v0.2.0 + v0.2.3–v0.2.13)

         Phase 2 rich preview: PDF + markdown + video thumbnails.
         Content-hashed _preview.{hash}/ folder in zip.
         Thumbnail generation progress indicator.
         ═══════════════════════════════════════════════════════════════════ -->

    <!-- 0. Build info (generated by CI — provides window.SGRAPH_BUILD) -->
    <script src="../_common/js/build-info.js"></script>
    <script>
        if (!window.SGRAPH_BUILD) {
            window.SGRAPH_BUILD = { appVersion: 'dev', uiVersion: 'v0.2.13' };
        } else {
            window.SGRAPH_BUILD.uiVersion = 'v0.2.13';
        }
    </script>

    <!-- 1. Utilities -->
    <script src="../_common/js/i18n.js"></script>
    <script src="../_common/js/crypto.js"></script>
    <script src="../_common/js/friendly-crypto.js"></script>
    <script src="../_common/js/api-client.js"></script>
    <script src="../_common/js/file-type-detect.js"></script>
    <script src="../_common/js/markdown-parser.js"></script>

    <!-- 2. Base system -->
    <script src="../_common/js/base/send-helpers.js"></script>
    <script src="../_common/js/base/send-component-paths.js"></script>
    <script src="../_common/js/base/send-component.js"></script>

    <!-- 3. Components — v0.2.0 base -->
    <script src="../_common/js/components/send-locale/send-locale.js"></script>
    <script src="../_common/js/components/send-header/send-header.js"></script>
    <script src="../_common/js/components/send-footer/send-footer.js"></script>
    <script src="../_common/js/components/send-transparency/send-transparency.js"></script>
    <script src="../_common/js/components/send-access-gate/send-access-gate.js"></script>
    <script src="../_common/js/components/send-upload/send-upload.js"></script>
    <script src="../_common/js/components/send-test-files/send-test-files.js"></script>

    <!-- 3a. v0.2.3 — Step indicator Web Component -->
    <script src="../_common/js/components/send-step-indicator/send-step-indicator.js"></script>

    <!-- 3b. v0.2.3 — Four-step wizard overlay -->
    <script src="../_common/js/components/send-upload/send-upload-v023.js"></script>

    <!-- 3c. v0.2.4 — Enhanced Step 1: type icons, thumbnails, paste, drag feedback -->
    <script src="../_common/js/components/send-upload/send-upload-v024.js"></script>

    <!-- 3d. v0.2.5 — Multi-file drop, smart skip, rich delivery metadata -->
    <script src="../_common/js/components/send-upload/send-upload-v025.js"></script>

    <!-- 3e. v0.2.6 — Share mode selection + confirmation summary + token bar -->
    <script src="../_common/js/components/send-upload/send-upload-v026.js"></script>
    <script src="../_common/js/components/send-access-gate/send-access-gate-v026.js"></script>

    <!-- 3f. v0.2.7 — Next button + trust-building progress carousel -->
    <script src="../_common/js/components/send-upload/send-upload-v027.js"></script>

    <!-- 3g. v0.2.8 — QR code generator (zero-dependency, from admin v0.1.3) -->
    <script src="../_common/js/qr-code.js"></script>

    <!-- 3h. v0.2.8 — Default selection, badge fix, dedup button, Copy All -->
    <script src="../_common/js/components/send-upload/send-upload-v028.js"></script>

    <!-- 3i. v0.2.9 — Friendly token derives transfer ID + AES key -->
    <script src="../_common/js/components/send-upload/send-upload-v029.js"></script>

    <!-- 3j. v0.2.10 — Gallery first, stable stepper, processing message fix, test images -->
    <script src="../_common/js/components/send-upload/send-upload-v0210.js"></script>

    <!-- 3k. v0.2.11 — Upload gallery preview in Step 2 (Delivery) -->
    <script src="../_common/js/components/send-upload/send-upload-v0211.js"></script>

    <!-- 3l. v0.2.12 — Rich preview: image thumbnails + _preview/ folder in zip -->
    <script src="../_common/js/components/send-upload/send-upload-v0212.js"></script>

    <!-- 3m. v0.2.13 — Phase 2: PDF + markdown + video thumbnails, content-hashed _preview, progress -->
    <script src="../_common/js/components/send-upload/send-upload-v0213.js"></script>

    <!-- 3n. v0.2.14 — Remove gallery preview from Step 2 (thumbnails not yet computed) -->
    <script src="../_common/js/components/send-upload/send-upload-v0214.js"></script>

    <!-- 3o. v0.2.15 — Taller carousel message area during encrypt/upload -->
    <script src="../_common/js/components/send-upload/send-upload-v0215.js"></script>

    <!-- 3p. v0.2.16 — Upload step click resets file selection -->
    <script src="../_common/js/components/send-upload/send-upload-v0216.js"></script>

    <!-- 3q. v0.2.17 — Single file gallery delivery: wrap in zip with _gallery folder -->
    <script src="../_common/js/components/send-upload/send-upload-v0217.js"></script>

    <!-- 4. Init -->
    <script>
        SendComponentPaths.init('../_common');
        I18n.init();
    </script>

</body>
</html>

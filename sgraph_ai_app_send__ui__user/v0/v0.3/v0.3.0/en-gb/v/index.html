<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SG/Send — View</title>
    <meta name="description" content="Decrypt and view your file. Zero-knowledge encryption — decryption happens in your browser.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../../_common/favicon.svg">

    <!-- Fonts -->
    <link rel="stylesheet" href="../../_common/fonts/fonts.css">

    <!-- Design tokens + shared styles -->
    <link rel="stylesheet" href="../../_common/css/design-tokens.css">
    <link rel="stylesheet" href="../../_common/css/shared-components.css">

    <!-- Component styles (header, footer, locale, transparency) -->
    <link rel="stylesheet" href="../../_common/js/components/send-header/send-header.css">
    <link rel="stylesheet" href="../../_common/js/components/send-footer/send-footer.css">
    <link rel="stylesheet" href="../../_common/js/components/send-locale/send-locale.css">
    <link rel="stylesheet" href="../../_common/js/components/send-transparency/send-transparency.css">

    <!-- sg-layout (from tools.sgraph.ai CDN — used by send-browse) -->
    <script type="module" src="https://dev.tools.sgraph.ai/core/sg-layout/v0.1.0/sg-layout.js"></script>
</head>
<body>

    <send-header></send-header>

    <main>
        <send-download></send-download>
    </main>

    <send-footer></send-footer>

    <!-- ═══════════════════════════════════════════════════════════════════
         v0.3.0 — Short URL route (/v/)
         Route detected by send-download.js via window.location.pathname
         ═══════════════════════════════════════════════════════════════════ -->

    <!-- 0. Vendored libraries -->
    <script src="../../_common/js/vendor/jszip.min.js"></script>

    <!-- 0. Build info -->
    <script src="../../_common/js/build-info.js"></script>
    <script>
        if (!window.SGRAPH_BUILD) {
            window.SGRAPH_BUILD = { appVersion: 'dev', uiVersion: 'v0.3.0' };
        } else {
            window.SGRAPH_BUILD.uiVersion = 'v0.3.0';
        }
    </script>

    <!-- 1. Utilities -->
    <script src="../../_common/js/i18n.js"></script>
    <script src="../../_common/js/crypto.js"></script>
    <script src="../../_common/js/friendly-crypto.js"></script>
    <script src="../../_common/js/api-client.js"></script>
    <script src="../../_common/js/file-type-detect.js"></script>
    <script src="../../_common/js/markdown-parser.js"></script>
    <script src="../../_common/js/sg-print.js"></script>

    <!-- 1b. SECURITY: Block API calls that would leak friendly tokens -->
    <script>
    (function() {
        var origFetch = window.fetch;
        window.fetch = function(url) {
            if (typeof url === 'string') {
                var match = url.match(/\/api\/transfers\/info\/(.+?)(?:\?|$)/);
                if (match && typeof FriendlyCrypto !== 'undefined' &&
                    FriendlyCrypto.isFriendlyToken(match[1])) {
                    console.warn('[security] Blocked API call that would leak friendly token:', match[1]);
                    return Promise.resolve(new Response('{"error":"blocked"}', {
                        status: 404, headers: { 'Content-Type': 'application/json' }
                    }));
                }
            }
            return origFetch.apply(this, arguments);
        };
    })();
    </script>

    <!-- 2. Base system -->
    <script src="../../_common/js/base/send-helpers.js"></script>
    <script src="../../_common/js/base/send-component-paths.js"></script>
    <script>
        SendComponentPaths.init('../../_common');
        SendComponentPaths.alias('send-viewer',  'send-download');
        SendComponentPaths.alias('send-gallery', 'send-download');
        SendComponentPaths.alias('send-browse',  'send-download');
    </script>
    <script src="../../_common/js/base/send-component.js"></script>

    <!-- 3. Shared components -->
    <script src="../../_common/js/components/send-locale/send-locale.js"></script>
    <script src="../../_common/js/components/send-header/send-header.js"></script>
    <script src="../../_common/js/components/send-header/send-header-beta.js"></script>
    <script src="../../_common/js/components/send-footer/send-footer.js"></script>
    <script src="../../_common/js/components/send-transparency/send-transparency.js"></script>

    <!-- 4. v0.3.0 shared assets + components (clean, no overlays) -->
    <script src="../../_common/js/send-icons.js"></script>
    <script src="../../_common/js/components/send-download/send-viewer.js"></script>
    <script src="../../_common/js/components/send-download/send-gallery.js"></script>
    <script src="../../_common/js/components/send-download/send-browse.js"></script>
    <script src="../../_common/js/components/send-download/send-download.js"></script>

    <!-- 5. Init -->
    <script>
        I18n.init();
    </script>

</body>
</html>

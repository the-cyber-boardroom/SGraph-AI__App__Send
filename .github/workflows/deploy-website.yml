name: Deploy Website - sgraph.ai

# v0.7.6 architecture: GitHub Actions is the trigger and executor.
# All deployment logic lives in Python scripts under scripts/.
#
# S3 path isolation by branch/environment:
#   websites/sgraph-ai/dev/    — dev branch (automatic)
#   websites/sgraph-ai/main/   — main branch (automatic)
#   websites/sgraph-ai/prod/   — production (manual dispatch)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'sgraph_ai__website/**'
      - 'scripts/deploy_static_site.py'
      - 'scripts/store_ci_artifacts.py'
      - 'scripts/generate_i18n_pages.py'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - main
          - dev

concurrency:
  group: "website-deploy-${{ inputs.environment || github.ref_name || 'dev' }}"
  cancel-in-progress: false

env:
  AWS_REGION  : eu-west-2
  WEBSITE_DIR : sgraph_ai__website
  SITE_NAME   : sgraph-ai

jobs:
  deploy:
    name: "Deploy to S3 + CloudFront (${{ inputs.environment || github.ref_name || 'dev' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'main') || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ env.AWS_REGION }}

      - name: Read version
        id: version
        run: echo "version=$(cat sgraph_ai_app_send/version)" >> $GITHUB_OUTPUT

      - name: Generate i18n locale pages
        run: python scripts/generate_i18n_pages.py

      - name: Resolve deployment environment
        id: env
        run: |
          DEPLOY_ENV="${{ inputs.environment || github.ref_name }}"
          if [ "$DEPLOY_ENV" == "production" ]; then
            echo "deploy_env=prod" >> $GITHUB_OUTPUT
            echo "Deploying to PRODUCTION (sgraph.ai) → S3: websites/sgraph-ai/prod/"
          elif [ "$DEPLOY_ENV" == "main" ]; then
            echo "deploy_env=main" >> $GITHUB_OUTPUT
            echo "Deploying to MAIN → S3: websites/sgraph-ai/main/"
          else
            echo "deploy_env=dev" >> $GITHUB_OUTPUT
            echo "Deploying to DEV → S3: websites/sgraph-ai/dev/"
          fi

      - name: Deploy static site
        run: |
          python scripts/deploy_static_site.py \
            --site ${{ env.SITE_NAME }} \
            --version ${{ steps.version.outputs.version }} \
            --source-dir ${{ env.WEBSITE_DIR }} \
            --bucket ${{ secrets.WEBSITE_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --deploy-env ${{ steps.env.outputs.deploy_env }} \
            --cloudfront-distribution-id ${{ secrets.WEBSITE_CF_DIST }} ${{ secrets.WEBSITE_CF_DIST_MAIN }} \
            --smoke-test-url "https://sgraph.ai" \
            --version-file sgraph_ai_app_send/version

      - name: Store CI artifacts
        run: |
          python scripts/store_ci_artifacts.py \
            --version ${{ steps.version.outputs.version }} \
            --bucket ${{ secrets.WEBSITE_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --site ${{ env.SITE_NAME }}

name: Deploy User UI to S3

# Publishes v0.2.0 (base) + all v0.2.x IFD overlays to S3.
# CloudFront separation: /api/* → Lambda origin, /* → S3 static files.
#
# IFD deployment model (auto-discovery):
#   1. v0.2.0 is always the base — deployed first
#   2. All v0.2.x directories (x > 0) are discovered automatically and deployed
#      in version order as overlays onto latest/
#   latest/ = union of v0.2.0 + all overlays (later versions win)
#
# Adding a new IFD version:
#   Just create sgraph_ai_app_send__ui__user/v0/v0.2/v0.2.N/ with your overlay
#   files. The CI will auto-discover and deploy it. No workflow changes needed.
#
# S3 path isolation by branch/environment:
#   websites/sgraph-send/dev/    — dev branch (automatic)
#   websites/sgraph-send/main/   — main branch (automatic)
#   websites/sgraph-send/prod/   — production (manual dispatch)
#
# Environments:
#   - dev:        dev.send.sgraph.ai   (default — push to dev branch)
#   - main:       main.send.sgraph.ai  (push to main branch)
#   - production: send.sgraph.ai       (manual dispatch)
#
# Secrets per environment:
#   - SGRAPH_SEND__UI_S3_BUCKET                   (shared — same bucket for now)
#   - SGRAPH_SEND__CLOUDFRONT_DISTRIBUTION_ID      (production CF distribution)
#   - SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID (dev CF distribution)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'sgraph_ai_app_send__ui__user/v0/v0.2/**'
      - 'sgraph_ai_app_send__ui__user/v0/v0.3/**'
      - 'sgraph_ai_app_send/version'
      - 'scripts/generate_send_i18n_pages.py'
      - 'scripts/inject_build_version.py'
      - '.github/workflows/deploy-ui-user.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - production
      rebuild_latest:
        description: 'Clean latest/ first, then deploy all versions from scratch (removes stale files)'
        required: false
        default: false
        type: boolean

concurrency:
  group: "ui-user-deploy-${{ inputs.environment || github.ref_name || 'dev' }}"
  cancel-in-progress: false

env:
  AWS_REGION       : eu-west-2
  UI_BASE_DIR_V02  : sgraph_ai_app_send__ui__user/v0/v0.2
  UI_BASE_DIR_V03  : sgraph_ai_app_send__ui__user/v0/v0.3
  UI_VERSION_BASE  : v0.2.0

jobs:
  deploy:
    name: "Publish UI to S3 + CloudFront (${{ inputs.environment || github.ref_name || 'dev' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'main') || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Discover IFD versions
        id: discover
        run: |
          # Find all v0.2.x directories, sort by version number
          VERSIONS_V02=$(ls -d ${{ env.UI_BASE_DIR_V02 }}/v0.2.* 2>/dev/null | xargs -n1 basename | sort -t. -k3 -n || true)
          echo "Found v0.2.x IFD versions:"
          echo "$VERSIONS_V02"
          echo "versions_v02=$(echo $VERSIONS_V02 | tr '\n' ' ')" >> $GITHUB_OUTPUT

          # Find all v0.3.x directories (self-contained, no overlays)
          VERSIONS_V03=$(ls -d ${{ env.UI_BASE_DIR_V03 }}/v0.3.* 2>/dev/null | xargs -n1 basename | sort -t. -k3 -n || true)
          echo "Found v0.3.x versions:"
          echo "$VERSIONS_V03"
          echo "versions_v03=$(echo $VERSIONS_V03 | tr '\n' ' ')" >> $GITHUB_OUTPUT

          # Combined list for build steps
          ALL_VERSIONS="$VERSIONS_V02 $VERSIONS_V03"
          echo "versions=$(echo $ALL_VERSIONS | tr '\n' ' ' | xargs)" >> $GITHUB_OUTPUT

      - name: Inject build version into all IFD versions
        run: |
          for VERSION in ${{ steps.discover.outputs.versions_v02 }}; do
            echo "Injecting build version into $VERSION (v0.2.x)"
            python scripts/inject_build_version.py --version "$VERSION"
          done
          for VERSION in ${{ steps.discover.outputs.versions_v03 }}; do
            echo "Injecting build version into $VERSION (v0.3.x)"
            python scripts/inject_build_version.py --version "$VERSION"
          done

      - name: Generate i18n locale pages for all IFD versions
        run: |
          for VERSION in ${{ steps.discover.outputs.versions_v02 }}; do
            echo "Generating i18n pages for $VERSION (v0.2.x)"
            python scripts/generate_send_i18n_pages.py --version "$VERSION"
          done
          for VERSION in ${{ steps.discover.outputs.versions_v03 }}; do
            echo "Generating i18n pages for $VERSION (v0.3.x)"
            python scripts/generate_send_i18n_pages.py --version "$VERSION"
          done

      - name: Check AWS credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "has-credentials=false" >> $GITHUB_OUTPUT
            echo "WARNING: AWS credentials not configured — skipping deployment"
          else
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check-creds.outputs.has-credentials == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ env.AWS_REGION }}

      - name: Resolve deployment environment
        id: env
        run: |
          DEPLOY_ENV="${{ inputs.environment || github.ref_name }}"
          if [ "$DEPLOY_ENV" == "production" ]; then
            echo "deploy_env=prod" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to PRODUCTION (send.sgraph.ai) → S3: websites/sgraph-send/prod/"
          elif [ "$DEPLOY_ENV" == "main" ]; then
            echo "deploy_env=main" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to MAIN → S3: websites/sgraph-send/main/"
          else
            echo "deploy_env=dev" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to DEV (dev.send.sgraph.ai) → S3: websites/sgraph-send/dev/"
          fi

      - name: Deploy all IFD versions to S3 (base + overlays in order)
        if: steps.check-creds.outputs.has-credentials == 'true'
        run: |
          # Deploy v0.2.x versions (IFD overlay chain)
          VERSIONS_V02=(${{ steps.discover.outputs.versions_v02 }})
          VERSIONS_V03=(${{ steps.discover.outputs.versions_v03 }})
          TOTAL=$(( ${#VERSIONS_V02[@]} + ${#VERSIONS_V03[@]} ))
          DEPLOY_COUNT=0

          for i in "${!VERSIONS_V02[@]}"; do
            VERSION="${VERSIONS_V02[$i]}"
            SOURCE_DIR="${{ env.UI_BASE_DIR_V02 }}/$VERSION"
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            echo ""
            echo "=== Deploying $VERSION ($SOURCE_DIR) [v0.2.x overlay $DEPLOY_COUNT/$TOTAL] ==="

            EXTRA_FLAGS=""

            # First version (base): apply clean flag if rebuild requested
            if [ "$i" -eq 0 ] && [ "${{ inputs.rebuild_latest }}" == "true" ]; then
              EXTRA_FLAGS="--clean-latest"
            fi

            python scripts/deploy_static_site.py \
              --site sgraph-send \
              --version "$VERSION" \
              --source-dir "$SOURCE_DIR" \
              --bucket ${{ secrets.SGRAPH_SEND__UI_S3_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --deploy-env ${{ steps.env.outputs.deploy_env }} \
              --skip-validation \
              $EXTRA_FLAGS
          done

          # Deploy v0.3.x versions (self-contained, no overlay chain)
          for i in "${!VERSIONS_V03[@]}"; do
            VERSION="${VERSIONS_V03[$i]}"
            SOURCE_DIR="${{ env.UI_BASE_DIR_V03 }}/$VERSION"
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            echo ""
            echo "=== Deploying $VERSION ($SOURCE_DIR) [v0.3.x self-contained $DEPLOY_COUNT/$TOTAL] ==="

            EXTRA_FLAGS=""

            # Last overall version: include CloudFront invalidation and version file
            if [ "$DEPLOY_COUNT" -eq "$TOTAL" ]; then
              EXTRA_FLAGS="$EXTRA_FLAGS --cloudfront-distribution-id ${{ steps.env.outputs.dist_id }} --version-file sgraph_ai_app_send/version"
            fi

            python scripts/deploy_static_site.py \
              --site sgraph-send \
              --version "$VERSION" \
              --source-dir "$SOURCE_DIR" \
              --bucket ${{ secrets.SGRAPH_SEND__UI_S3_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --deploy-env ${{ steps.env.outputs.deploy_env }} \
              --skip-validation \
              $EXTRA_FLAGS
          done

          echo ""
          echo "=== Deployed $TOTAL versions: ${VERSIONS_V02[*]} ${VERSIONS_V03[*]} ==="

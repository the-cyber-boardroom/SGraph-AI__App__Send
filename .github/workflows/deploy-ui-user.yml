name: Deploy User UI to S3

# Publishes v0.2.0 (base) + v0.2.1 + v0.2.2 (IFD overlays) static UI files to S3.
# CloudFront separation: /api/* → Lambda origin, /* → S3 static files.
#
# IFD deployment model:
#   1. Deploy v0.2.0 base → releases/v0/v0.2/v0.2.0/ + overlay onto latest/
#   2. Deploy v0.2.1 overlay → releases/v0/v0.2/v0.2.1/ + overlay onto latest/
#   3. Deploy v0.2.2 overlay → releases/v0/v0.2/v0.2.2/ + overlay onto latest/
#   latest/ = union of v0.2.0 + v0.2.1 + v0.2.2 (later overlays win)
#
# Deploy is manifest-driven — manifest.json lists exactly what gets deployed:
#   - source_folders: _common/, en-gb/, i18n/ (in git)
#   - ci_generated_folders: locale HTML pages (generated here, never in git)
#   - root_files: manifest.json
#
# S3 path isolation by branch/environment:
#   websites/sgraph-send/dev/    — dev branch (automatic)
#   websites/sgraph-send/main/   — main branch (automatic)
#   websites/sgraph-send/prod/   — production (manual dispatch)
#
# Steps:
#   1. Generate i18n locale pages for v0.2.0, v0.2.1, and v0.2.2
#   2. Deploy v0.2.0 base to S3 (releases + latest overlay)
#   3. Deploy v0.2.1 overlay to S3 (releases + latest overlay)
#   4. Deploy v0.2.2 overlay to S3 (releases + latest overlay)
#   5. Invalidate CloudFront cache
#
# Environments:
#   - dev:        dev.send.sgraph.ai   (default — push to dev branch)
#   - main:       main.send.sgraph.ai  (push to main branch)
#   - production: send.sgraph.ai       (manual dispatch)
#
# Secrets per environment:
#   - SGRAPH_SEND__UI_S3_BUCKET                   (shared — same bucket for now)
#   - SGRAPH_SEND__CLOUDFRONT_DISTRIBUTION_ID      (production CF distribution)
#   - SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID (dev CF distribution)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'sgraph_ai_app_send__ui__user/v0/v0.2/**'
      - 'sgraph_ai_app_send/version'
      - 'scripts/generate_send_i18n_pages.py'
      - 'scripts/inject_build_version.py'
      - '.github/workflows/deploy-ui-user.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - production
      rebuild_latest:
        description: 'Clean latest/ first, then deploy v0.2.0 + v0.2.1 + v0.2.2 from scratch (removes stale files)'
        required: false
        default: false
        type: boolean

concurrency:
  group: "ui-user-deploy-${{ inputs.environment || github.ref_name || 'dev' }}"
  cancel-in-progress: false

env:
  AWS_REGION      : eu-west-2
  UI_VERSION_BASE : v0.2.0
  UI_VERSION_V021 : v0.2.1
  UI_VERSION      : v0.2.2
  # IFD: base + overlays. All three get deployed in order.
  SOURCE_DIR_BASE : sgraph_ai_app_send__ui__user/v0/v0.2/v0.2.0
  SOURCE_DIR_V021 : sgraph_ai_app_send__ui__user/v0/v0.2/v0.2.1
  SOURCE_DIR      : sgraph_ai_app_send__ui__user/v0/v0.2/v0.2.2

jobs:
  deploy:
    name: "Publish UI to S3 + CloudFront (${{ inputs.environment || github.ref_name || 'dev' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'main') || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject build version into UI (v0.2.0 base + v0.2.1 + v0.2.2 overlays)
        run: |
          python scripts/inject_build_version.py --version ${{ env.UI_VERSION_BASE }}
          python scripts/inject_build_version.py --version ${{ env.UI_VERSION_V021 }}
          python scripts/inject_build_version.py --version ${{ env.UI_VERSION }}

      - name: Generate i18n locale pages (v0.2.0 base + v0.2.1 + v0.2.2 overlays)
        run: |
          python scripts/generate_send_i18n_pages.py --version ${{ env.UI_VERSION_BASE }}
          python scripts/generate_send_i18n_pages.py --version ${{ env.UI_VERSION_V021 }}
          python scripts/generate_send_i18n_pages.py --version ${{ env.UI_VERSION }}

      - name: Check AWS credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "has-credentials=false" >> $GITHUB_OUTPUT
            echo "WARNING: AWS credentials not configured — skipping deployment"
          else
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check-creds.outputs.has-credentials == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ env.AWS_REGION }}

      - name: Resolve deployment environment
        id: env
        run: |
          DEPLOY_ENV="${{ inputs.environment || github.ref_name }}"
          if [ "$DEPLOY_ENV" == "production" ]; then
            echo "deploy_env=prod" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to PRODUCTION (send.sgraph.ai) → S3: websites/sgraph-send/prod/"
          elif [ "$DEPLOY_ENV" == "main" ]; then
            echo "deploy_env=main" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to MAIN → S3: websites/sgraph-send/main/"
          else
            echo "deploy_env=dev" >> $GITHUB_OUTPUT
            echo "dist_id=${{ secrets.SGRAPH_SEND__DEV__CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
            echo "Deploying to DEV (dev.send.sgraph.ai) → S3: websites/sgraph-send/dev/"
          fi

      - name: Deploy v0.2.0 base to S3
        if: steps.check-creds.outputs.has-credentials == 'true'
        run: |
          # Deploy v0.2.0 base first. On rebuild, clean latest/ before overlaying.
          CLEAN_FLAG=""
          if [ "${{ inputs.rebuild_latest }}" == "true" ]; then
            CLEAN_FLAG="--clean-latest"
          fi
          python scripts/deploy_static_site.py \
            --site sgraph-send \
            --version ${{ env.UI_VERSION_BASE }} \
            --source-dir ${{ env.SOURCE_DIR_BASE }} \
            --bucket ${{ secrets.SGRAPH_SEND__UI_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --deploy-env ${{ steps.env.outputs.deploy_env }} \
            --skip-validation \
            $CLEAN_FLAG

      - name: Deploy v0.2.1 overlay to S3
        if: steps.check-creds.outputs.has-credentials == 'true'
        run: |
          python scripts/deploy_static_site.py \
            --site sgraph-send \
            --version ${{ env.UI_VERSION_V021 }} \
            --source-dir ${{ env.SOURCE_DIR_V021 }} \
            --bucket ${{ secrets.SGRAPH_SEND__UI_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --deploy-env ${{ steps.env.outputs.deploy_env }} \
            --skip-validation

      - name: Deploy v0.2.2 overlay to S3
        if: steps.check-creds.outputs.has-credentials == 'true'
        run: |
          python scripts/deploy_static_site.py \
            --site sgraph-send \
            --version ${{ env.UI_VERSION }} \
            --source-dir ${{ env.SOURCE_DIR }} \
            --bucket ${{ secrets.SGRAPH_SEND__UI_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --deploy-env ${{ steps.env.outputs.deploy_env }} \
            --cloudfront-distribution-id ${{ steps.env.outputs.dist_id }} \
            --skip-validation \
            --version-file sgraph_ai_app_send/version
